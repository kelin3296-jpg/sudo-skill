name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
          body: |
            ## Changes
            See [CHANGELOG.md](CHANGELOG.md) for details.

            ## Installation
            ```bash
            # Clone the repository
            git clone https://github.com/${{ github.repository }}.git ~/.claude/skills/sudo

            # Or download the latest release
            curl -L https://github.com/${{ github.repository }}/archive/${{ github.ref_name }}.tar.gz | tar xz -C ~/.claude/skills
            ```
